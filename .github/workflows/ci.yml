name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: autogarden
          POSTGRES_PASSWORD: password
          POSTGRES_DB: autogarden_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry install --no-interaction
      - name: Lint
        working-directory: backend
        run: poetry run ruff check .
      - name: Type check
        working-directory: backend
        run: poetry run mypy app/
      - name: Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://autogarden:password@localhost:5432/autogarden_test
          SECRET_KEY: ci-secret-key-not-for-production
          JWT_SECRET_KEY: ci-jwt-secret-key-not-for-production
        run: poetry run pytest --cov=app --cov-report=xml

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npm run type-check
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000